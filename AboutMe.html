<!DOCTYPE html>
<html lang="en">

<head>

    <title>About Me</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header-box">
        <h1>Tara's Portfolio of Doom</h1>

        <a style="padding: 10px; color: white;" href="index.html">Home</a>

    <script>
        const links = document.querySelectorAll("a");

        links.forEach(link => {
            link.addEventListener("click", function(event) {
                event.preventDefault();

                const page = this.href;
                const wrapper = document.querySelector(".home-wrapper, .about-wrapper");

                wrapper.classList.add("pop-out");

                setTimeout(() => {
                    window.location.href = page;
                }, 500);
            });
        });
    </script>
